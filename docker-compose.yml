version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: placement_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-placement_tracker}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./database/seeds:/docker-entrypoint-initdb.d/seeds:ro
      - ./database/init.sh:/docker-entrypoint-initdb.d/00_init.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-placement_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - placement_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placement_tracker_api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-placement_tracker}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres_secure_password}
      ALLOWED_ORIGINS: http://localhost,http://frontend
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - placement_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: placement_tracker_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - placement_net

volumes:
  postgres_data:
    name: placement_tracker_postgres
  uploads_data:
    name: placement_tracker_uploads
  logs_data:
    name: placement_tracker_logs

networks:
  placement_net:
    name: placement_tracker_network
    driver: bridge
